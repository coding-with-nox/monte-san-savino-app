services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      TENANT_DB_NAME: ${TENANT_DB_NAME:-tenant_db_1}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data

  backend:
    image: ghcr.io/coding-with-nox/monte-san-savino-app-backend:latest
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      db-schema:
        condition: service_completed_successfully
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${TENANT_DB_NAME:-tenant_db_1}
      PG_USER: ${POSTGRES_USER:-postgres}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "3000:3000"

  frontend:
    image: ghcr.io/coding-with-nox/monte-san-savino-app-frontend:latest
    depends_on:
      backend:
        condition: service_started
      db-seed:
        condition: service_completed_successfully
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

  # One-shot psql client: loads schema into the postgres service database.
  db-schema:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TENANT_DB_NAME: ${TENANT_DB_NAME:-tenant_db_1}
      PGHOST: postgres
      PGPORT: 5432
    volumes:
      - ./docker/postgres/01-init-tenant.sh:/scripts/01-init-tenant.sh:ro
    command: >
      bash -c "until pg_isready -h postgres -p 5432 -U $${POSTGRES_USER}; do sleep 1; done;
      bash /scripts/01-init-tenant.sh"
    restart: "no"

  # One-shot psql client: loads seed data into the same postgres service database.
  db-seed:
    image: postgres:16
    depends_on:
      backend:
        condition: service_started
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TENANT_DB_NAME: ${TENANT_DB_NAME:-tenant_db_1}
      PGHOST: postgres
      PGPORT: 5432
    volumes:
      - ./docker/postgres/02-test-data.sh:/scripts/02-test-data.sh:ro
    command: >
      bash -c "
        until pg_isready -h postgres -p 5432 -U $${POSTGRES_USER}; do sleep 1; done;
        export PGPASSWORD=$${POSTGRES_PASSWORD};
        until psql -h postgres -U $${POSTGRES_USER} -d $${TENANT_DB_NAME} -tAc \"SELECT to_regclass('public.team_mates') IS NOT NULL AND to_regclass('public.award_brackets') IS NOT NULL AND to_regclass('public.judge_completions') IS NOT NULL;\" | grep -q t; do sleep 1; done;
        bash /scripts/02-test-data.sh
      "
    restart: "no"

volumes:
  pgdata:
  miniodata:
