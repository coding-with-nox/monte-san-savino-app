services:
  adminer:
    image: adminer:4
    ports:
      - "8888:8080"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    image: oven/bun:1.1.29
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "bun install && bun run dev"
    ports:
      - "3000:3000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:3000

volumes:
  frontend_modules:
